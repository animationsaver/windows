name: Windows RDP via Tailscale

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: "Minutes to keep the session alive (max ~350 / 6h limit)"
        required: false
        default: "350"
  repository_dispatch:
    types: [start-rdp]

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360   # GitHub Actions hard limit (6 hours)
    steps:
      - name: Set RDP password
        shell: powershell
        run: |
          $pw = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $pw
          Write-Host "runneradmin password set"

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Uncomment only if you cannot connect due to NLA:
          # Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Write-Host "RDP enabled"

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" -Wait
          Write-Host "Tailscale installed"

      - name: Remove stale Tailscale device
        shell: powershell
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TS_API_KEY)) {
            Write-Host "TS_API_KEY not set; skipping stale-device cleanup"
          } else {
            $headers = @{ Authorization = "Bearer $env:TS_API_KEY" }
            try {
              $resp = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/-/devices" -Headers $headers
              foreach ($d in $resp.devices) {
                if (($d.hostname -like "gha-windows-rdp*") -or ($d.name -like "gha-windows-rdp*")) {
                  Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers $headers
                  Write-Host "Deleted stale device: $($d.name)"
                }
              }
            } catch {
              Write-Host "Cleanup failed: $($_.Exception.Message)"
            }
          }

      - name: Connect Tailscale
        shell: powershell
        run: |
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          & $ts up --authkey="${{ secrets.TS_AUTHKEY }}" --hostname="gha-windows-rdp" --accept-routes --unattended
          Start-Sleep -Seconds 5
          $ip = & $ts ip -4
          Write-Host "=================================================="
          Write-Host "  Tailscale IP : $ip"
          Write-Host "  Connect via RDP as user: runneradmin"
          Write-Host "=================================================="

      - name: Add Japanese input (Microsoft IME)
        shell: powershell
        run: |
          # Keep English UI, but add Japanese so the Microsoft IME is available.
          $list = New-WinUserLanguageList -Language en-US
          $list.Add("ja-JP")
          Set-WinUserLanguageList -LanguageList $list -Force
          # Refresh the input switcher for the current desktop session (best-effort)
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Process explorer.exe
          Write-Host "Japanese (Microsoft IME) added. Switch input with Win+Space or Alt+Shift."

      - name: Keep session alive
        shell: powershell
        env:
          SESSION_MINUTES: "${{ github.event.inputs.session_minutes || github.event.client_payload.minutes || '350' }}"
        run: |
          $minutes = [int]"$env:SESSION_MINUTES"
          if ($minutes -le 0) { $minutes = 60 }
          $deadline = (Get-Date).AddMinutes($minutes)
          Write-Host "Keeping session for $minutes minutes (until $deadline)"
          Write-Host "Create stop.txt on the Desktop to end early"
          while ((Get-Date) -lt $deadline) {
            if (Test-Path "C:\Users\runneradmin\Desktop\stop.txt") {
              Write-Host "stop.txt detected. Ending."
              break
            }
            Start-Sleep -Seconds 30
          }

      - name: Tailscale logout and remove device
        if: always()
        shell: powershell
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          if (Test-Path $ts) {
            & $ts logout
            Write-Host "Logged out"
          } else {
            Write-Host "Tailscale not installed; skipping logout"
          }
          # Also remove the node from the tailnet so the hostname is freed (no -1 next run)
          if (-not [string]::IsNullOrWhiteSpace($env:TS_API_KEY)) {
            $headers = @{ Authorization = "Bearer $env:TS_API_KEY" }
            try {
              $resp = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/-/devices" -Headers $headers
              foreach ($d in $resp.devices) {
                if (($d.hostname -like "gha-windows-rdp*") -or ($d.name -like "gha-windows-rdp*")) {
                  Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers $headers
                  Write-Host "Removed device from tailnet: $($d.name)"
                }
              }
            } catch {
              Write-Host "Device removal failed: $($_.Exception.Message)"
            }
          }
