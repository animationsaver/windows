name: macOS Screen Sharing via Tailscale

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: "Minutes to keep the session alive (max ~350 / 6h limit)"
        required: false
        default: "350"
  repository_dispatch:
    types: [start-vnc]

jobs:
  vnc:
    runs-on: macos-latest
    timeout-minutes: 360   # GitHub Actions hard limit (6 hours)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A freshly created user avoids the SecureToken problem that makes
      # resetting the built-in 'runner' password unreliable.
      - name: Create dedicated VNC admin user 'vncuser'
        env:
          ACCOUNT_PW: ${{ secrets.RDP_PASSWORD }}
        run: |
          set -e
          PW="${ACCOUNT_PW:-changeme1234}"
          sudo sysadminctl -addUser vncuser -fullName "VNC User" -password "$PW" -admin
          sudo createhomedir -c -u vncuser >/dev/null 2>&1 || true
          echo "Created user 'vncuser' (login name: vncuser)."

      # Use the built-in Screen Sharing service, NOT Remote Management (ARD).
      # Remote Management (kickstart -activate) locks out Finder's vnc:// on
      # macOS 12.1+, so we explicitly turn it OFF and enable plain screensharing.
      - name: Enable built-in Screen Sharing (not Remote Management)
        env:
          VNC_LEGACY_PW: ${{ secrets.VNC_PASSWORD }}
          FALLBACK_PW: ${{ secrets.RDP_PASSWORD }}
        run: |
          set +e
          KICK="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"

          # Make sure Remote Management is off so it does not control Screen Sharing.
          sudo "$KICK" -deactivate -stop 2>/dev/null

          # Enable + start the built-in Screen Sharing daemon.
          sudo defaults write /var/db/launchd.db/com.apple.launchd/overrides.plist \
            com.apple.screensharing -dict Disabled -bool false 2>/dev/null
          sudo launchctl enable system/com.apple.screensharing 2>/dev/null
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null

          # Set a legacy VNC password (max 8 chars) so ANY VNC client, including
          # Finder's Screen Sharing, can authenticate with just the password.
          PW="${VNC_LEGACY_PW:-}"
          if [ -z "$PW" ]; then PW="$(printf '%s' "$FALLBACK_PW" | cut -c1-8)"; fi
          if [ -n "$PW" ]; then
            sudo "$KICK" -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$PW" 2>/dev/null
            echo "Legacy VNC password configured (only the first 8 chars are used)."
          fi
          # Restart screensharingd so settings take effect.
          sudo pkill -x screensharingd 2>/dev/null
          sleep 2
          echo "Built-in Screen Sharing enabled."

      - name: Install Tailscale
        run: |
          brew install tailscale
          echo "Tailscale installed"

      - name: Remove stale Tailscale device
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          if [ -z "$TS_API_KEY" ]; then
            echo "TS_API_KEY not set; skipping stale-device cleanup"
          else
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-macos-vnc")) or (.name // "" | startswith("gha-macos-vnc"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Deleted stale device: $id"
            done
          fi

      - name: Connect Tailscale
        run: |
          sudo tailscaled > /tmp/tailscaled.log 2>&1 &
          sleep 5
          sudo tailscale up --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="gha-macos-vnc" --accept-routes
          sleep 3
          IP=$(tailscale ip -4)
          echo "=================================================="
          echo "  Tailscale IP : $IP"
          echo "  From a Mac   : Finder > Go > Connect to Server > vnc://$IP"
          echo "  Auth         : enter the VNC password (VNC_PASSWORD, or"
          echo "                 the first 8 chars of RDP_PASSWORD if unset)."
          echo "  Account login (if prompted): vncuser / RDP_PASSWORD"
          echo "=================================================="

      - name: Provision Chrome environment (optional)
        run: |
          if [ -f setup.sh ]; then
            chmod +x setup.sh
            ./setup.sh || echo "setup.sh failed (non-fatal)"
          else
            echo "setup.sh not found; skipping"
          fi

      - name: Add Japanese input source (best-effort)
        run: |
          defaults write com.apple.HIToolbox AppleEnabledInputSources -array-add \
            '{ "InputSourceKind" = "Keyboard Layout"; "KeyboardLayout ID" = 0; "KeyboardLayout Name" = "U.S."; }' \
            '{ "Bundle ID" = "com.apple.inputmethod.Kotoeri"; "Input Mode" = "com.apple.inputmethod.Japanese"; "InputSourceKind" = "Input Mode"; }' 2>/dev/null || true
          echo "Japanese (Kotoeri) input requested. Switch with Ctrl+Space / the menu bar."

      - name: Keep session alive
        env:
          SESSION_MINUTES: "${{ github.event.inputs.session_minutes || github.event.client_payload.minutes || '350' }}"
        run: |
          MIN="${SESSION_MINUTES:-350}"
          case "$MIN" in ''|*[!0-9]*) MIN=60;; esac
          if [ "$MIN" -le 0 ]; then MIN=60; fi
          echo "Keeping session for $MIN minutes"
          echo "Create /Users/vncuser/Desktop/stop.txt to end early"
          END=$(( $(date +%s) + MIN * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            if [ -f "/Users/vncuser/Desktop/stop.txt" ] || [ -f "/Users/runner/Desktop/stop.txt" ]; then
              echo "stop.txt detected. Ending."
              break
            fi
            sleep 30
          done

      - name: Tailscale logout and remove device
        if: always()
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          sudo tailscale logout || echo "logout skipped"
          if [ -n "$TS_API_KEY" ]; then
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-macos-vnc")) or (.name // "" | startswith("gha-macos-vnc"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Removed device from tailnet: $id"
            done
          fi
