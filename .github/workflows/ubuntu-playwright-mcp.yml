name: Ubuntu Playwright MCP + SSH via Tailscale Funnel

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: "Minutes to keep the session alive (max ~350 / 6h limit)"
        required: false
        default: "350"
      mcp_port:
        description: "Local port for the Playwright MCP server"
        required: false
        default: "8931"
  repository_dispatch:
    types: [start-playwright-mcp]

jobs:
  playwright-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright MCP + Chromium
        run: |
          npm install -g @playwright/mcp@latest
          # Install Chromium and its OS dependencies for headless runs
          npx playwright install --with-deps chromium
          echo "Playwright MCP installed"

      - name: Enable SSH server
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-server
          sudo mkdir -p /run/sshd
          if [ -n "$SSH_PUBLIC_KEY" ]; then
            mkdir -p /home/runner/.ssh
            echo "$SSH_PUBLIC_KEY" >> /home/runner/.ssh/authorized_keys
            chmod 700 /home/runner/.ssh
            chmod 600 /home/runner/.ssh/authorized_keys
            echo "Installed SSH public key for user 'runner'"
          fi
          if [ -n "$SSH_PASSWORD" ]; then
            echo "runner:$SSH_PASSWORD" | sudo chpasswd
            sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            echo "Enabled password auth for user 'runner'"
          fi
          sudo sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null || sudo /usr/sbin/sshd
          echo "SSH server ready on port 22"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "Tailscale installed"

      - name: Start tailscaled (userspace networking)
        run: |
          sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 \
            --statedir=/var/lib/tailscale > /tmp/tailscaled.log 2>&1 &
          sleep 5
          echo "tailscaled started"

      - name: Remove stale Tailscale device
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          if [ -z "$TS_API_KEY" ]; then
            echo "TS_API_KEY not set; skipping stale-device cleanup"
          else
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-ubuntu-mcp")) or (.name // "" | startswith("gha-ubuntu-mcp"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Deleted stale device: $id"
            done
          fi

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="gha-ubuntu-mcp" --ssh --accept-routes
          sleep 3
          tailscale ip -4 || true

      - name: Start Playwright MCP server
        env:
          MCP_PORT: "${{ github.event.inputs.mcp_port || github.event.client_payload.mcp_port || '8931' }}"
        run: |
          PORT="${MCP_PORT:-8931}"
          echo "$PORT" > /tmp/mcp_port
          nohup npx @playwright/mcp@latest --port "$PORT" --host 127.0.0.1 --headless \
            > /tmp/mcp.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null "http://127.0.0.1:$PORT/mcp"; then
              echo "Playwright MCP is up on 127.0.0.1:$PORT"
              break
            fi
            sleep 2
          done
          echo "----- mcp.log -----"
          cat /tmp/mcp.log || true

      - name: Expose Playwright MCP + SSH via Tailscale Funnel
        run: |
          PORT="$(cat /tmp/mcp_port)"
          # Playwright MCP over public HTTPS :443
          sudo tailscale funnel --bg --https=443 "http://127.0.0.1:$PORT"
          # SSH over public TLS-terminated TCP :8443 (client must wrap in TLS)
          sudo tailscale funnel --bg --tls-terminated-tcp=8443 "tcp://127.0.0.1:22"
          sleep 3
          sudo tailscale funnel status || true
          HOST=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "=================================================="
          echo "  Playwright MCP (SSE/HTTP) public endpoint:"
          echo "    https://$HOST/mcp"
          echo ""
          echo "  SSH (TLS-terminated TCP on :8443):"
          echo "    ssh -o ProxyCommand='openssl s_client -quiet -connect $HOST:8443' runner@$HOST"
          echo "=================================================="

      - name: Keep session alive
        env:
          SESSION_MINUTES: "${{ github.event.inputs.session_minutes || github.event.client_payload.minutes || '350' }}"
        run: |
          MIN="${SESSION_MINUTES:-350}"
          case "$MIN" in ''|*[!0-9]*) MIN=60;; esac
          if [ "$MIN" -le 0 ]; then MIN=60; fi
          echo "Keeping session for $MIN minutes"
          echo "Create /tmp/stop.txt on the runner to end early"
          END=$(( $(date +%s) + MIN * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            if [ -f "/tmp/stop.txt" ]; then
              echo "stop.txt detected. Ending."
              break
            fi
            if ! pgrep -f "@playwright/mcp" >/dev/null 2>&1; then
              echo "Playwright MCP process is no longer running:"
              cat /tmp/mcp.log || true
              break
            fi
            sleep 30
          done

      - name: Tailscale funnel off + logout
        if: always()
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          sudo tailscale funnel --https=443 off || echo "funnel https off skipped"
          sudo tailscale funnel --tls-terminated-tcp=8443 off || echo "funnel tcp off skipped"
          sudo tailscale logout || echo "logout skipped"
          if [ -n "$TS_API_KEY" ]; then
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-ubuntu-mcp")) or (.name // "" | startswith("gha-ubuntu-mcp"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Removed device from tailnet: $id"
            done
          fi
