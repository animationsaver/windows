name: Ubuntu Playwright MCP + SSH MCP + RDP via Tailscale

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      session_minutes:
        description: "Minutes to keep the session alive (max ~350 / 6h limit)"
        required: false
        default: "350"
      mcp_port:
        description: "Local port for the Playwright MCP server"
        required: false
        default: "8931"
  repository_dispatch:
    types: [start-playwright-mcp]

jobs:
  playwright-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SSH_MCP_PORT: "8932"
      VNC_PORT: "5900"
      RDP_PORT: "3389"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packages (browsers, desktop, xrdp, proxy)
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install --with-deps chromium
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openssh-server xfce4 xfce4-goodies dbus-x11 \
            xvfb x11vnc xrdp pipx chromium-browser || \
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openssh-server xfce4 xfce4-goodies dbus-x11 \
            xvfb x11vnc xrdp pipx
          pipx install mcp-proxy || pip install --user mcp-proxy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "Packages installed"

      - name: Enable SSH server + local key for SSH MCP
        run: |
          sudo mkdir -p /run/sshd
          mkdir -p /home/runner/.ssh
          ssh-keygen -t ed25519 -N "" -f /home/runner/.ssh/mcp_key <<< y
          cat /home/runner/.ssh/mcp_key.pub >> /home/runner/.ssh/authorized_keys
          chmod 700 /home/runner/.ssh
          chmod 600 /home/runner/.ssh/authorized_keys /home/runner/.ssh/mcp_key
          sudo sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null || sudo /usr/sbin/sshd
          echo "SSH server ready on 127.0.0.1:22"

      - name: Start PERSISTENT desktop (Xvfb + XFCE) and attach xrdp via x11vnc
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          export DISPLAY=:0
          echo "DISPLAY=:0" >> "$GITHUB_ENV"
          # 1) Standing virtual display + desktop, independent of any RDP client.
          #    The session lives here (not created on connect), so reconnecting
          #    with an RDP client always returns to the SAME session.
          setsid Xvfb :0 -screen 0 1600x900x24 < /dev/null > /tmp/xvfb.log 2>&1 &
          sleep 3
          setsid startxfce4 < /dev/null > /tmp/xfce.log 2>&1 &
          sleep 3
          # 2) x11vnc serves the standing :0 display on localhost (xrdp backend).
          mkdir -p /home/runner/.vnc
          PW="${VNC_PASSWORD:-}"
          if [ -z "$PW" ]; then PW="changeme"; echo "WARNING: VNC_PASSWORD not set; using default 'changeme'"; fi
          x11vnc -storepasswd "$PW" /home/runner/.vnc/passwd
          setsid x11vnc -display :0 -rfbauth /home/runner/.vnc/passwd -forever -shared \
            -localhost -rfbport "$VNC_PORT" -bg -o /tmp/x11vnc.log < /dev/null > /tmp/x11vnc.out 2>&1 || true
          sleep 2
          # 3) Point xrdp at the standing x11vnc session (libvnc backend => persistent).
          printf '%s\n' \
            '[Globals]' \
            'port=3389' \
            'crypt_level=high' \
            'channel_code=1' \
            'max_bpp=24' \
            'bitmap_cache=yes' \
            'bitmap_compression=yes' \
            '[Standing]' \
            'name=Standing Desktop (persistent)' \
            'lib=libvnc.so' \
            'ip=127.0.0.1' \
            'port=5900' \
            'username=na' \
            'password=ask' | sudo tee /etc/xrdp/xrdp.ini > /dev/null
          sudo systemctl restart xrdp 2>/dev/null || sudo service xrdp restart 2>/dev/null || { sudo xrdp-sesman || true; sudo xrdp || true; }
          sleep 2
          echo "xrdp listening on :$RDP_PORT -> persistent :0 desktop"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "Tailscale installed"

      - name: Start tailscaled (userspace networking)
        run: |
          sudo setsid tailscaled --tun=userspace-networking --socks5-server=localhost:1055 \
            --statedir=/var/lib/tailscale < /dev/null > /tmp/tailscaled.log 2>&1 &
          sleep 5
          echo "tailscaled started"

      - name: Remove stale Tailscale device
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          if [ -z "$TS_API_KEY" ]; then
            echo "TS_API_KEY not set; skipping stale-device cleanup"
          else
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-ubuntu-rdp")) or (.name // "" | startswith("gha-ubuntu-rdp"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Deleted stale device: $id"
            done
          fi

      - name: Connect Tailscale (with Tailscale SSH enabled)
        run: |
          sudo tailscale up --authkey="${{ secrets.TS_AUTHKEY }}" \
            --hostname="gha-ubuntu-rdp" --ssh --accept-routes
          sleep 3
          tailscale ip -4 || true

      - name: Restore cached Tailscale TLS certificate
        id: cert-cache
        uses: actions/cache/restore@v4
        with:
          path: ts-cert-cache
          key: ts-cert-gha-ubuntu-rdp-${{ github.run_id }}
          restore-keys: |
            ts-cert-gha-ubuntu-rdp-

      - name: Seed tailscaled with cached certificate (avoids Let's Encrypt rate limit)
        run: |
          HOST=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          sudo mkdir -p /var/lib/tailscale/certs
          if [ -f "ts-cert-cache/$HOST.crt" ] && [ -f "ts-cert-cache/$HOST.key" ]; then
            sudo cp "ts-cert-cache/$HOST.crt" "/var/lib/tailscale/certs/$HOST.crt"
            sudo cp "ts-cert-cache/$HOST.key" "/var/lib/tailscale/certs/$HOST.key"
            sudo chmod 600 "/var/lib/tailscale/certs/$HOST.key"
            echo "Restored cached TLS certificate for $HOST"
          else
            echo "No cached certificate for $HOST (first run for this hostname); a fresh one will be issued."
          fi

      - name: Start Playwright MCP server
        env:
          MCP_PORT: "${{ github.event.inputs.mcp_port || github.event.client_payload.mcp_port || '8931' }}"
        run: |
          PORT="${MCP_PORT:-8931}"
          echo "$PORT" > /tmp/mcp_port
          # Playwright MCP has DNS-rebinding protection and returns 403
          # ("Access is only allowed at localhost:PORT") for any Host header
          # other than its bound host. Behind Tailscale Funnel the incoming
          # Host header is the public MagicDNS name, so it must be allowed
          # explicitly via --allowed-hosts or no external client (incl. Notion)
          # can connect.
          #
          # IMPORTANT: do NOT add --allowed-origins here. That flag is a
          # BROWSER navigation allowlist (network security boundary), not the
          # server Host check. Setting it restricts the automated browser to
          # only that origin and blocks navigation to every other site with
          # net::ERR_BLOCKED_BY_CLIENT.
          TSHOST=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "Allowing Host: $TSHOST"
          setsid npx @playwright/mcp@latest --port "$PORT" --host 127.0.0.1 --headless \
            --allowed-hosts "$TSHOST" \
            < /dev/null > /tmp/mcp.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null --max-time 5 "http://127.0.0.1:$PORT/mcp"; then
              echo "Playwright MCP is up on 127.0.0.1:$PORT"; break
            fi
            sleep 2
          done
          cat /tmp/mcp.log || true

      - name: Start SSH MCP server (stdio -> HTTP/SSE via mcp-proxy)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          setsid mcp-proxy --host 127.0.0.1 --port "$SSH_MCP_PORT" -- \
            npx -y ssh-mcp -- --host=127.0.0.1 --port=22 --user=runner \
            --key=/home/runner/.ssh/mcp_key --maxChars=none \
            < /dev/null > /tmp/ssh-mcp.log 2>&1 &
          # NOTE: /sse is a long-lived SSE stream, so curling it blocks forever
          # and hangs this step. Probe the TCP port being open instead.
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/"$SSH_MCP_PORT") 2>/dev/null; then
              exec 3>&- 3<&-
              echo "SSH MCP port $SSH_MCP_PORT is open"; break
            fi
            sleep 2
          done
          sleep 2
          cat /tmp/ssh-mcp.log || true

      - name: Expose MCP servers via Tailscale Funnel
        run: |
          PORT="$(cat /tmp/mcp_port)"
          sudo tailscale funnel --bg --https=443  "http://127.0.0.1:$PORT"
          sudo tailscale funnel --bg --https=8443 "http://127.0.0.1:$SSH_MCP_PORT"
          sleep 3
          sudo tailscale funnel status || true
          HOST=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          IP=$(tailscale ip -4 | head -n1)
          echo "=================================================="
          echo "  Playwright MCP : https://$HOST/mcp"
          echo "  SSH MCP (SSE)  : https://$HOST:8443/sse"
          echo "  SSH MCP (HTTP) : https://$HOST:8443/mcp"
          echo ""
          echo "  RDP (Tailscale, NOT Funnel): $IP:3389  or  $HOST:3389"
          echo "    -> pick 'Standing Desktop', password = VNC_PASSWORD"
          echo "  Your own SSH  : ssh runner@$HOST   (Tailscale SSH)"
          echo "=================================================="

      - name: Persist Tailscale TLS certificate to cache
        run: |
          HOST=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          mkdir -p ts-cert-cache
          # Materialize / renew the cert. Uses the existing cert if still valid;
          # only calls Let's Encrypt when the cert is missing or near expiry.
          # timeout so a rate-limited ACME request can never hang the job.
          sudo timeout 120 tailscale cert \
            --cert-file "/tmp/$HOST.crt" --key-file "/tmp/$HOST.key" "$HOST" \
            || echo "tailscale cert non-zero (keeping existing cert store if present)"
          if [ -f "/tmp/$HOST.crt" ] && [ -f "/tmp/$HOST.key" ]; then
            sudo cp "/tmp/$HOST.crt" "ts-cert-cache/$HOST.crt"
            sudo cp "/tmp/$HOST.key" "ts-cert-cache/$HOST.key"
          elif [ -f "/var/lib/tailscale/certs/$HOST.crt" ]; then
            sudo cp "/var/lib/tailscale/certs/$HOST.crt" "ts-cert-cache/$HOST.crt"
            sudo cp "/var/lib/tailscale/certs/$HOST.key" "ts-cert-cache/$HOST.key"
          fi
          sudo chown -R "$(id -u):$(id -g)" ts-cert-cache || true
          ls -la ts-cert-cache || true

      - name: Save Tailscale TLS certificate cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ts-cert-cache
          key: ts-cert-gha-ubuntu-rdp-${{ github.run_id }}

      - name: Keep session alive
        env:
          SESSION_MINUTES: "${{ github.event.inputs.session_minutes || github.event.client_payload.minutes || '350' }}"
        run: |
          MIN="${SESSION_MINUTES:-350}"
          case "$MIN" in ''|*[!0-9]*) MIN=60;; esac
          if [ "$MIN" -le 0 ]; then MIN=60; fi
          echo "Keeping session for $MIN minutes"
          echo "Create /tmp/stop.txt on the runner to end early"
          END=$(( $(date +%s) + MIN * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            if [ -f "/tmp/stop.txt" ]; then echo "stop.txt detected. Ending."; break; fi
            sleep 30
          done

      - name: Tailscale funnel off + logout
        if: always()
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
        run: |
          sudo tailscale funnel --https=443 off  || echo "443 off skipped"
          sudo tailscale funnel --https=8443 off || echo "8443 off skipped"
          sudo tailscale logout || echo "logout skipped"
          if [ -n "$TS_API_KEY" ]; then
            ids=$(curl -s -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/tailnet/-/devices" \
              | jq -r '.devices[] | select((.hostname // "" | startswith("gha-ubuntu-rdp")) or (.name // "" | startswith("gha-ubuntu-rdp"))) | .id')
            for id in $ids; do
              curl -s -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
                "https://api.tailscale.com/api/v2/device/$id" >/dev/null
              echo "Removed device from tailnet: $id"
            done
          fi
